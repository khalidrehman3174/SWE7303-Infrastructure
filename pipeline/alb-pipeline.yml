AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - ALB Module Pipeline
  Deploys alb.yml only. Creates Application Load Balancer,
  listeners, and target groups for Frontend and Backend services.
  Depends on VPC pipeline outputs.
  Trigger: push to SWE7303-Infrastructure main branch (cloudformation/alb.yml)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  ProjectName:
    Type: String
    Default: finpay

  GitHubConnectionArn:
    Type: String

  RepoOwner:
    Type: String
    Default: khalidrehman3174

  RepoName:
    Type: String
    Default: SWE7303-Infrastructure

  RepoBranch:
    Type: String
    Default: main

  ArtifactBucketName:
    Type: String

Resources:

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-alb-pipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ALBPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetObjectVersion, s3:GetBucketVersioning]
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}"
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource: "*"
              - Effect: Allow
                Action: [cloudformation:*, iam:PassRole]
                Resource: "*"
              - Effect: Allow
                Action: [codestar-connections:UseConnection]
                Resource: !Ref GitHubConnectionArn

  CFNRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-alb-cfn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  BuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-alb-build-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ALBBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: "*"
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject]
                Resource: !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: [cloudformation:ValidateTemplate]
                Resource: "*"

  ValidateProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb-validate"
      ServiceRole: !GetAtt BuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              commands:
                - pip install cfn-lint
            build:
              commands:
                - echo "=== Validating alb.yml ==="
                - aws cloudformation validate-template --template-body file://cloudformation/alb.yml --region eu-west-2
                - cfn-lint cloudformation/alb.yml
                - echo "=== ALB template is valid ==="
          artifacts:
            files: ['**/*']

  ALBPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb-pipeline"
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:

        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${RepoOwner}/${RepoName}"
                BranchName: !Ref RepoBranch
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: Source
              RunOrder: 1

        - Name: Validate
          Actions:
            - Name: ValidateALB
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref ValidateProject
              InputArtifacts:
                - Name: Source
              OutputArtifacts:
                - Name: ValidatedSource
              RunOrder: 1

        - Name: Deploy
          Actions:
            - Name: CreateChangeSet
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CHANGE_SET_REPLACE
                StackName: !Sub "${ProjectName}-${Environment}-alb"
                ChangeSetName: !Sub "${ProjectName}-${Environment}-alb-changeset"
                TemplatePath: "ValidatedSource::cloudformation/alb.yml"
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CFNRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "${Environment}",
                    "ProjectName": "${ProjectName}"
                  }
              InputArtifacts:
                - Name: ValidatedSource
              RunOrder: 1
            - Name: ExecuteChangeSet
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CHANGE_SET_EXECUTE
                StackName: !Sub "${ProjectName}-${Environment}-alb"
                ChangeSetName: !Sub "${ProjectName}-${Environment}-alb-changeset"
              RunOrder: 2

Outputs:
  PipelineName:
    Value: !Ref ALBPipeline
  PipelineUrl:
    Value: !Sub "https://eu-west-2.console.aws.amazon.com/codesuite/codepipeline/pipelines/${ProjectName}-${Environment}-alb-pipeline/view"
