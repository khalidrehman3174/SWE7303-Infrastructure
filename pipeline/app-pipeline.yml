AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - Application Pipeline
  Single CodePipeline with CodeBuild to build, test, and deploy the
  Finpay PHP application container image to ECS Fargate via ECR.
  Source is the SWE7303-Application GitHub repository.

# -------------------------------------------------------
# Parameters
# -------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  GitHubOwner:
    Type: String
    Default: khalidrehman3174
    Description: GitHub organisation or username

  GitHubRepo:
    Type: String
    Default: SWE7303-Application
    Description: GitHub repository name for the application code

  GitHubBranch:
    Type: String
    Default: dev
    Description: GitHub branch to trigger the pipeline from

  CodeStarConnectionArn:
    Type: String
    Description: ARN of the CodeStar connection to GitHub

  ECRStackName:
    Type: String
    Default: finpay-ecr
    Description: ECR stack name (to import backend repository URI)

  ECSStackName:
    Type: String
    Default: finpay-ecs-cluster
    Description: ECS cluster stack name (to import cluster and service names)

  InfraPipelineStackName:
    Type: String
    Default: finpay-infra-pipeline
    Description: Infra pipeline stack name (to import shared artifact bucket)

# -------------------------------------------------------
# Resources
# -------------------------------------------------------
Resources:

  # ---------------------------------------------------
  # 1. CloudWatch Log Group for CodeBuild
  # ---------------------------------------------------
  AppBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/codebuild/finpay-${EnvironmentName}/app"
      RetentionInDays: 14

  # ---------------------------------------------------
  # 2. CodeBuild IAM Role
  # ---------------------------------------------------
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "finpay-${EnvironmentName}-app-codebuild-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppCodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !ImportValue
                  Fn::Sub: "${ECRStackName}-BackendRepositoryArn"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${BucketName}"
                    - BucketName: !ImportValue
                        Fn::Sub: "${InfraPipelineStackName}-ArtifactBucketName"
                  - !Sub
                    - "arn:aws:s3:::${BucketName}/*"
                    - BucketName: !ImportValue
                        Fn::Sub: "${InfraPipelineStackName}-ArtifactBucketName"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:finpay/${EnvironmentName}/*"
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 3. CodePipeline IAM Role
  # ---------------------------------------------------
  AppPipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "finpay-${EnvironmentName}-app-pipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${BucketName}"
                    - BucketName: !ImportValue
                        Fn::Sub: "${InfraPipelineStackName}-ArtifactBucketName"
                  - !Sub
                    - "arn:aws:s3:::${BucketName}/*"
                    - BucketName: !ImportValue
                        Fn::Sub: "${InfraPipelineStackName}-ArtifactBucketName"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt AppBuildProject.Arn
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref CodeStarConnectionArn
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 4. CodeBuild Project
  # ---------------------------------------------------
  AppBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "finpay-${EnvironmentName}-app-build"
      Description: Build, test, and push the Finpay PHP application Docker image to ECR
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO_URI
            Value: !ImportValue
              Fn::Sub: "${ECRStackName}-BackendRepositoryUri"
          - Name: ENVIRONMENT
            Value: !Ref EnvironmentName
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Artifacts:
        Type: CODEPIPELINE
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref AppBuildLogGroup
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 5. Application Pipeline
  # ---------------------------------------------------
  AppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "finpay-${EnvironmentName}-app-pipeline"
      RoleArn: !GetAtt AppPipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !ImportValue
          Fn::Sub: "${InfraPipelineStackName}-ArtifactBucketName"
      Stages:

        # ── Stage 1: Source ──────────────────────────────
        - Name: Source
          Actions:
            - Name: AppSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: AppSource
              RunOrder: 1

        # ── Stage 2: Build + Test ────────────────────────
        - Name: Build-and-Test
          Actions:
            - Name: BuildApp
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref AppBuildProject
              InputArtifacts:
                - Name: AppSource
              OutputArtifacts:
                - Name: AppBuildOutput
              RunOrder: 1

        # ── Stage 3: Deploy to ECS ───────────────────────
        - Name: Deploy-to-ECS
          Actions:
            - Name: DeployApp
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              Configuration:
                ClusterName: !ImportValue
                  Fn::Sub: "${ECSStackName}-ClusterName"
                ServiceName: !ImportValue
                  Fn::Sub: "${ECSStackName}-BackendServiceName"
                FileName: imagedefinitions.json
              InputArtifacts:
                - Name: AppBuildOutput
              RunOrder: 1

      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  AppPipelineName:
    Description: Application pipeline name
    Value: !Ref AppPipeline
    Export:
      Name: !Sub "${AWS::StackName}-AppPipelineName"

  AppBuildProjectName:
    Description: CodeBuild project name
    Value: !Ref AppBuildProject
    Export:
      Name: !Sub "${AWS::StackName}-AppBuildProjectName"

  AppBuildLogGroupName:
    Description: CodeBuild CloudWatch log group
    Value: !Ref AppBuildLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-AppBuildLogGroupName"