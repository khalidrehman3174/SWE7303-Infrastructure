AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - ElastiCache Module Pipeline
  Deploys elasticache.yml only. Creates Redis cluster.
  Depends on VPC pipeline outputs.
  Trigger: push to SWE7303-Infrastructure main branch (cloudformation/elasticache.yml)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  ProjectName:
    Type: String
    Default: finpay

  GitHubConnectionArn:
    Type: String

  RepoOwner:
    Type: String
    Default: khalidrehman3174

  RepoName:
    Type: String
    Default: SWE7303-Infrastructure

  RepoBranch:
    Type: String
    Default: main

  ArtifactBucketName:
    Type: String

Resources:

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-elasticache-pipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ElastiCachePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetObjectVersion, s3:GetBucketVersioning]
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}"
                  - !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource: "*"
              - Effect: Allow
                Action: [cloudformation:*, iam:PassRole]
                Resource: "*"
              - Effect: Allow
                Action: [codestar-connections:UseConnection]
                Resource: !Ref GitHubConnectionArn

  CFNRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-elasticache-cfn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  BuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-elasticache-build-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ElastiCacheBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: "*"
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject]
                Resource: !Sub "arn:aws:s3:::${ArtifactBucketName}/*"
              - Effect: Allow
                Action: [cloudformation:ValidateTemplate]
                Resource: "*"

  ValidateProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-elasticache-validate"
      ServiceRole: !GetAtt BuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            build:
              commands:
                - echo "=== Validating cloudformation/elasticache.yml ==="
                - aws cloudformation validate-template --template-body file://cloudformation/elasticache.yml --region eu-west-2
                - echo "=== Template is valid ==="
          artifacts:
            files:
              - '**/*'
