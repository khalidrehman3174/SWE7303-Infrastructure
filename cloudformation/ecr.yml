AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - ECR Repositories Stack
  Provisions Amazon ECR private repositories for the Frontend and Backend
  container images, with lifecycle policies, image scanning, and KMS encryption.

# -------------------------------------------------------
# Parameters
# -------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  ImageRetentionCount:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 50
    Description: Number of tagged images to retain per repository

  UntaggedImageRetentionDays:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 14
    Description: Days to retain untagged images before expiry

# -------------------------------------------------------
# Resources
# -------------------------------------------------------
Resources:

  # ---------------------------------------------------
  # 1. ECR Repository - Frontend
  # ---------------------------------------------------
  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "finpay/${EnvironmentName}/frontend"
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after ${UntaggedImageRetentionDays} day(s)",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${UntaggedImageRetentionDays}
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep only the last ${ImageRetentionCount} tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v", "release", "latest"],
                  "countType": "imageCountMoreThan",
                  "countNumber": ${ImageRetentionCount}
                },
                "action": { "type": "expire" }
              }
            ]
          }
      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowECSTaskExecution
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
          - Sid: AllowCodeBuildPush
            Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-frontend"
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Service
          Value: frontend

  # ---------------------------------------------------
  # 2. ECR Repository - Backend
  # ---------------------------------------------------
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "finpay/${EnvironmentName}/backend"
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after ${UntaggedImageRetentionDays} day(s)",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${UntaggedImageRetentionDays}
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep only the last ${ImageRetentionCount} tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v", "release", "latest"],
                  "countType": "imageCountMoreThan",
                  "countNumber": ${ImageRetentionCount}
                },
                "action": { "type": "expire" }
              }
            ]
          }
      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowECSTaskExecution
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
          - Sid: AllowCodeBuildPush
            Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-backend"
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Service
          Value: backend

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  FrontendRepositoryUri:
    Description: Frontend ECR repository URI
    Value: !GetAtt FrontendRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-FrontendRepositoryUri"

  FrontendRepositoryArn:
    Description: Frontend ECR repository ARN
    Value: !GetAtt FrontendRepository.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FrontendRepositoryArn"

  FrontendRepositoryName:
    Description: Frontend ECR repository name
    Value: !Ref FrontendRepository
    Export:
      Name: !Sub "${AWS::StackName}-FrontendRepositoryName"

  BackendRepositoryUri:
    Description: Backend ECR repository URI
    Value: !GetAtt BackendRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-BackendRepositoryUri"

  BackendRepositoryArn:
    Description: Backend ECR repository ARN
    Value: !GetAtt BackendRepository.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BackendRepositoryArn"

  BackendRepositoryName:
    Description: Backend ECR repository name
    Value: !Ref BackendRepository
    Export:
      Name: !Sub "${AWS::StackName}-BackendRepositoryName"