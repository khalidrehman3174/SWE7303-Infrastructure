AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - ECS Fargate Cluster Stack
  Provisions ECS cluster, task definitions, services, IAM roles,
  security groups, and CloudWatch log groups for Frontend and Backend services.
  ALB, listeners, and target groups are imported from the ALB stack.

# -------------------------------------------------------
# Parameters
# -------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  VpcStackName:
    Type: String
    Default: finpay-vpc
    Description: Name of the VPC CloudFormation stack (used for Fn::ImportValue)

  ALBStackName:
    Type: String
    Default: finpay-alb
    Description: Name of the ALB CloudFormation stack (used for Fn::ImportValue)

  FrontendImage:
    Type: String
    Description: ECR image URI for the Frontend service (React/PHP)
    Default: "PLACEHOLDER_FRONTEND_IMAGE"

  BackendImage:
    Type: String
    Description: ECR image URI for the Backend API service
    Default: "PLACEHOLDER_BACKEND_IMAGE"

  FrontendContainerPort:
    Type: Number
    Default: 80
    Description: Port the frontend container listens on

  BackendContainerPort:
    Type: Number
    Default: 8080
    Description: Port the backend container listens on

  FrontendTaskCpu:
    Type: Number
    Default: 512
    AllowedValues: [256, 512, 1024, 2048, 4096]
    Description: CPU units for the frontend task (1 vCPU = 1024)

  FrontendTaskMemory:
    Type: Number
    Default: 1024
    AllowedValues: [512, 1024, 2048, 4096, 8192]
    Description: Memory (MB) for the frontend task

  BackendTaskCpu:
    Type: Number
    Default: 1024
    AllowedValues: [256, 512, 1024, 2048, 4096]
    Description: CPU units for the backend task

  BackendTaskMemory:
    Type: Number
    Default: 2048
    AllowedValues: [512, 1024, 2048, 4096, 8192]
    Description: Memory (MB) for the backend task

  FrontendDesiredCount:
    Type: Number
    Default: 2
    Description: Desired number of frontend tasks

  BackendDesiredCount:
    Type: Number
    Default: 2
    Description: Desired number of backend tasks

# -------------------------------------------------------
# Resources
# -------------------------------------------------------
Resources:

  # ---------------------------------------------------
  # 1. ECS Cluster
  # ---------------------------------------------------
  FinpayECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "finpay-${EnvironmentName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  # ---------------------------------------------------
  # 2. CloudWatch Log Groups
  # ---------------------------------------------------
  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/finpay-${EnvironmentName}/frontend"
      RetentionInDays: 30

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/finpay-${EnvironmentName}/backend"
      RetentionInDays: 30

  # ---------------------------------------------------
  # 3. IAM Roles
  # ---------------------------------------------------

  # Task Execution Role - used by ECS agent to pull images and write logs
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "finpay-${EnvironmentName}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource: "*"
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # Task Role - permissions the running container uses at runtime
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "finpay-${EnvironmentName}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FinpayTaskPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::finpay-${EnvironmentName}-*/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:finpay/${EnvironmentName}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 4. Security Groups
  # ---------------------------------------------------

  # Frontend Security Group - only accepts traffic from ALB
  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finpay Frontend ECS tasks
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref FrontendContainerPort
          ToPort: !Ref FrontendContainerPort
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBSecurityGroupId"
          Description: Allow traffic from ALB only
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-frontend-sg"
        - Key: Project
          Value: Finpay

  # Backend Security Group - accepts from ALB and Frontend tasks
  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finpay Backend ECS tasks
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref BackendContainerPort
          ToPort: !Ref BackendContainerPort
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBSecurityGroupId"
          Description: Allow traffic from ALB
        - IpProtocol: tcp
          FromPort: !Ref BackendContainerPort
          ToPort: !Ref BackendContainerPort
          SourceSecurityGroupId: !Ref FrontendSecurityGroup
          Description: Allow traffic from Frontend tasks
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-backend-sg"
        - Key: Project
          Value: Finpay

  # ---------------------------------------------------
  # 5. Task Definitions
  # ---------------------------------------------------
  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "finpay-${EnvironmentName}-frontend"
      Cpu: !Ref FrontendTaskCpu
      Memory: !Ref FrontendTaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: frontend
          Image: !Ref FrontendImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref FrontendContainerPort
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: !Ref EnvironmentName
            - Name: REACT_APP_API_URL
              Value: !Sub
                - "http://${ALBDns}/api"
                - ALBDns: !ImportValue
                    Fn::Sub: "${ALBStackName}-ALBDNSName"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "curl -f http://localhost:${FrontendContainerPort}/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "finpay-${EnvironmentName}-backend"
      Cpu: !Ref BackendTaskCpu
      Memory: !Ref BackendTaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref BackendContainerPort
              Protocol: tcp
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:finpay/${EnvironmentName}/db-password"
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:finpay/${EnvironmentName}/jwt-secret"
          Environment:
            - Name: APP_ENV
              Value: !Ref EnvironmentName
            - Name: PORT
              Value: !Sub "${BackendContainerPort}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "curl -f http://localhost:${BackendContainerPort}/api/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 6. ECS Services
  # ---------------------------------------------------
  FrontendService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "finpay-${EnvironmentName}-frontend"
      Cluster: !Ref FinpayECSCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: !Ref FrontendDesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${VpcStackName}-PrivateSubnet1Id"
            - !ImportValue
              Fn::Sub: "${VpcStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - !Ref FrontendSecurityGroup
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: !Ref FrontendContainerPort
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ALBStackName}-FrontendTargetGroupArn"
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 60
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  BackendService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "finpay-${EnvironmentName}-backend"
      Cluster: !Ref FinpayECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: !Ref BackendDesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${VpcStackName}-PrivateSubnet1Id"
            - !ImportValue
              Fn::Sub: "${VpcStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - !Ref BackendSecurityGroup
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: !Ref BackendContainerPort
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ALBStackName}-BackendTargetGroupArn"
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 60
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 7. Auto Scaling
  # ---------------------------------------------------
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "finpay-${EnvironmentName}-autoscaling-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

  FrontendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 6
      MinCapacity: 2
      ResourceId: !Sub "service/${FinpayECSCluster}/${FrontendService.Name}"
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  FrontendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "finpay-${EnvironmentName}-frontend-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref FrontendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  BackendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 8
      MinCapacity: 2
      ResourceId: !Sub "service/${FinpayECSCluster}/${BackendService.Name}"
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  BackendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "finpay-${EnvironmentName}-backend-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref BackendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref FinpayECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt FinpayECSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  FrontendSecurityGroupId:
    Description: Frontend ECS tasks Security Group ID
    Value: !Ref FrontendSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-FrontendSecurityGroupId"

  BackendSecurityGroupId:
    Description: Backend ECS tasks Security Group ID
    Value: !Ref BackendSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-BackendSecurityGroupId"

  ECSTaskExecutionRoleArn:
    Description: ECS Task Execution Role ARN
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ECSTaskExecutionRoleArn"

  ECSTaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ECSTaskRoleArn"

  FrontendServiceName:
    Description: Frontend ECS Service name
    Value: !GetAtt FrontendService.Name
    Export:
      Name: !Sub "${AWS::StackName}-FrontendServiceName"

  BackendServiceName:
    Description: Backend ECS Service name
    Value: !GetAtt BackendService.Name
    Export:
      Name: !Sub "${AWS::StackName}-BackendServiceName"