AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - ECS Cluster Stack
  Provisions the ECS cluster, IAM execution/task roles, security groups,
  and CloudWatch log groups ONLY. No task definitions or services.
  Deployed by the infra pipeline before any Docker images exist in ECR.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for security groups

  ProjectName:
    Type: String
    Default: finpay
    Description: Project name prefix for resource naming

Outputs:
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ECSClusterName"

  ClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ECSClusterArn"

  ECSTaskExecutionRoleArn:
    Description: ECS Task Execution Role ARN (used by task definitions in ecs-services.yml)
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ECSTaskExecutionRoleArn"

  ECSTaskRoleArn:
    Description: ECS Task Role ARN (used by task definitions in ecs-services.yml)
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ECSTaskRoleArn"

  FrontendSecurityGroupId:
    Description: Security Group for the Frontend ECS service
    Value: !Ref FrontendServiceSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-FrontendSGId"

  BackendSecurityGroupId:
    Description: Security Group for the Backend ECS service
    Value: !Ref BackendServiceSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-BackendSGId"

  FrontendLogGroupName:
    Description: CloudWatch Log Group for Frontend service
    Value: !Ref FrontendLogGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-FrontendLogGroup"

  BackendLogGroupName:
    Description: CloudWatch Log Group for Backend service
    Value: !Ref BackendLogGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-BackendLogGroup"

Resources:

  # ─────────────────────────────────────────────
  # ECS Cluster
  # ─────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-${Environment}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 4
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ─────────────────────────────────────────────
  # IAM: Task Execution Role
  # Allows ECS agent to pull images from ECR and
  # write logs to CloudWatch on behalf of tasks.
  # ─────────────────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - ssm:GetParameters
                  - ssm:GetParameter
                  - kms:Decrypt
                Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ─────────────────────────────────────────────
  # IAM: Task Role
  # Runtime permissions for application containers
  # (e.g. S3, SQS, DynamoDB access at runtime).
  # ─────────────────────────────────────────────
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FinpayTaskPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${ProjectName}-${Environment}-*/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:eu-west-2:123086253062:log-group:/ecs/${ProjectName}/${Environment}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:eu-west-2:123086253062:secret:${ProjectName}/${Environment}/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ─────────────────────────────────────────────
  # Security Groups
  # Defined here so the ALB stack and service stack
  # can both import them via cross-stack references.
  # ─────────────────────────────────────────────
  FrontendServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-${Environment}-frontend-sg"
      GroupDescription: Security group for Finpay Frontend ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
          Description: Frontend React app port
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-frontend-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  BackendServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-${Environment}-backend-sg"
      GroupDescription: Security group for Finpay Backend ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref FrontendServiceSecurityGroup
          Description: Allow traffic from Frontend tasks only
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: ALB health checks and direct access (restrict in prod)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backend-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ─────────────────────────────────────────────
  # CloudWatch Log Groups
  # Created here so they exist before tasks start.
  # Retention set to 30 days to manage costs.
  # ─────────────────────────────────────────────
  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}/${Environment}/frontend"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}/${Environment}/backend"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
