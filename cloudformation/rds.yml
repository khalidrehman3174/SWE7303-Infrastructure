AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - RDS MySQL + ElastiCache Redis Stack
  Provisions a MySQL RDS instance, ElastiCache Redis cluster, subnet groups,
  parameter groups, and security groups for the Finpay data tier.

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  VpcStackName:
    Type: String
    Default: finpay-vpc
    Description: Name of the VPC CloudFormation stack (used for Fn::ImportValue)

  ECSStackName:
    Type: String
    Default: finpay-ecs-cluster
    Description: Name of the ECS cluster stack (imports backend security group)

  DBName:
    Type: String
    Default: finpaydb
    MinLength: 1
    MaxLength: 64
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9]*"
    Description: MySQL database name

  DBUsername:
    Type: String
    Default: finpayadmin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9]*"
    Description: RDS master username (password stored in Secrets Manager)

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.r6g.large
    Description: RDS instance class

  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 100
    Description: Allocated storage in GB

  DBEngineVersion:
    Type: String
    Default: "8.0"
    AllowedValues: ["8.0", "5.7"]
    Description: MySQL engine version

  DBBackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: Number of days to retain automated RDS backups

  DBDeletionProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable deletion protection on the RDS instance

  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.r6g.large
    Description: ElastiCache node type

  CacheNumNodes:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 3
    Description: Number of ElastiCache Redis nodes

Conditions:
  IsProduction: !Equals [!Ref EnvironmentName, "production"]
  EnableDeletionProtection: !Equals [!Ref DBDeletionProtection, "true"]

Resources:

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finpay RDS MySQL instance
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: "${ECSStackName}-BackendSecurityGroupId"
          Description: Allow MySQL from ECS Backend tasks only
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-rds-sg"
        - Key: Project
          Value: Finpay

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finpay ElastiCache Redis cluster
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: "${ECSStackName}-BackendSecurityGroupId"
          Description: Allow Redis from ECS Backend tasks only
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-redis-sg"
        - Key: Project
          Value: Finpay

  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "finpay-${EnvironmentName}-rds-subnet-group"
      DBSubnetGroupDescription: !Sub "Subnet group for Finpay ${EnvironmentName} RDS instance"
      SubnetIds:
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PrivateSubnet2Id"
      Tags:
        - Key: Project
          Value: Finpay

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub "finpay-${EnvironmentName}-redis-subnet-group"
      Description: !Sub "Subnet group for Finpay ${EnvironmentName} ElastiCache Redis"
      SubnetIds:
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PrivateSubnet2Id"

  RDSParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: !Sub "mysql${DBEngineVersion}"
      Description: !Sub "Finpay ${EnvironmentName} MySQL parameter group"
      Parameters:
        slow_query_log: "1"
        long_query_time: "2"
        character_set_server: "utf8mb4"
        collation_server: "utf8mb4_unicode_ci"
      Tags:
        - Key: Project
          Value: Finpay

  # FIX 1: redis7.0 -> redis7 (correct parameter group family name)
  ElastiCacheParameterGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      CacheParameterGroupFamily: "redis7"
      Description: !Sub "Finpay ${EnvironmentName} Redis parameter group"
      Properties:
        maxmemory-policy: "allkeys-lru"

  # FIX 2: Removed DBPasswordSecret - already exists in Secrets Manager
  # RDS will resolve the password directly from the existing secret

  FinpayRDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "finpay-${EnvironmentName}-mysql"
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: !Ref DBEngineVersion
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:finpay/${EnvironmentName}/db-password:SecretString:password}}"
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref RDSSubnetGroup
      DBParameterGroupName: !Ref RDSParameterGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: !Ref DBBackupRetentionDays
      PreferredBackupWindow: "02:00-03:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      DeletionProtection: !If [EnableDeletionProtection, true, false]
      EnableCloudwatchLogsExports:
        - error
        - slowquery
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-mysql"
        - Key: Project
          Value: Finpay

  FinpayRedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub "finpay-${EnvironmentName}-redis"
      Engine: redis
      EngineVersion: "7.0"
      CacheNodeType: !Ref CacheNodeType
      NumCacheNodes: !Ref CacheNumNodes
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      CacheParameterGroupName: !Ref ElastiCacheParameterGroup
      VpcSecurityGroupIds:
        - !Ref ElastiCacheSecurityGroup
      Port: 6379
      PreferredMaintenanceWindow: "sun:05:00-sun:06:00"
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-redis"
        - Key: Project
          Value: Finpay

  RDSHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-high-cpu"
      AlarmDescription: RDS CPU utilisation exceeded 80%
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref FinpayRDSInstance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  RDSLowStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-low-storage"
      AlarmDescription: RDS free storage below 5GB
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref FinpayRDSInstance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5368709120
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching

  RDSHighConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-high-connections"
      AlarmDescription: RDS connection count exceeded 80
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref FinpayRDSInstance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  RedisHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-redis-high-cpu"
      AlarmDescription: Redis CPU utilisation exceeded 70%
      Namespace: AWS/ElastiCache
      MetricName: CPUUtilization
      Dimensions:
        - Name: CacheClusterId
          Value: !Ref FinpayRedisCluster
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  RDSInstanceId:
    Description: RDS instance identifier
    Value: !Ref FinpayRDSInstance
    Export:
      Name: !Sub "${AWS::StackName}-RDSInstanceId"

  RDSEndpointAddress:
    Description: RDS instance endpoint hostname
    Value: !GetAtt FinpayRDSInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpointAddress"

  RDSEndpointPort:
    Description: RDS instance endpoint port
    Value: !GetAtt FinpayRDSInstance.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpointPort"

  DBName:
    Description: MySQL database name
    Value: !Ref DBName
    Export:
      Name: !Sub "${AWS::StackName}-DBName"

  DBUsername:
    Description: RDS master username
    Value: !Ref DBUsername
    Export:
      Name: !Sub "${AWS::StackName}-DBUsername"

  RDSSecurityGroupId:
    Description: RDS security group ID
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-RDSSecurityGroupId"

  RedisClusterEndpoint:
    Description: ElastiCache Redis cluster endpoint address
    Value: !GetAtt FinpayRedisCluster.RedisEndpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RedisEndpointAddress"

  RedisClusterPort:
    Description: ElastiCache Redis cluster port
    Value: !GetAtt FinpayRedisCluster.RedisEndpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-RedisEndpointPort"

  ElastiCacheSecurityGroupId:
    Description: ElastiCache security group ID
    Value: !Ref ElastiCacheSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ElastiCacheSecurityGroupId"
