AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - Application Load Balancer Stack
  Provisions the ALB, HTTPS/HTTP listeners, target groups, security group,
  and path-based routing rules for Frontend and Backend ECS services.

# -------------------------------------------------------
# Parameters
# -------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  VpcStackName:
    Type: String
    Default: finpay-vpc
    Description: Name of the VPC CloudFormation stack

  FrontendContainerPort:
    Type: Number
    Default: 80
    Description: Port the frontend container listens on

  BackendContainerPort:
    Type: Number
    Default: 8080
    Description: Port the backend container listens on

  CertificateArn:
    Type: String
    Default: ""
    Description: >
      ARN of the ACM certificate for HTTPS. Leave blank for HTTP only
      (not recommended for production).

  DeletionProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable ALB deletion protection (recommended for production)

# -------------------------------------------------------
# Conditions
# -------------------------------------------------------
Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  IsProduction: !Equals [!Ref EnvironmentName, "production"]

# -------------------------------------------------------
# Resources
# -------------------------------------------------------
Resources:

  # ---------------------------------------------------
  # 1. ALB Security Group
  # ---------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finpay Application Load Balancer
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTPS from anywhere
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-alb-sg"
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 2. Application Load Balancer
  # ---------------------------------------------------
  FinpayALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "finpay-${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PublicSubnet1Id"
        - !ImportValue
          Fn::Sub: "${VpcStackName}-PublicSubnet2Id"
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "60"
        - Key: deletion_protection.enabled
          Value: !If [IsProduction, "true", !Ref DeletionProtection]
        - Key: routing.http2.enabled
          Value: "true"
        - Key: access_logs.s3.enabled
          Value: "false"
      Tags:
        - Key: Name
          Value: !Sub "finpay-${EnvironmentName}-alb"
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 3. Target Groups
  # ---------------------------------------------------
  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "finpay-${EnvironmentName}-frontend-tg"
      Port: !Ref FrontendContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "finpay-${EnvironmentName}-backend-tg"
      Port: !Ref BackendContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${VpcStackName}-VpcId"
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 4. Listeners
  # ---------------------------------------------------

  # HTTP Listener - redirects to HTTPS if cert provided, else forwards to frontend
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref FinpayALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref FrontendTargetGroup

  # HTTPS Listener - only created when CertificateArn is provided
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref FinpayALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  # Path-based routing rule: /api/* and /api -> Backend target group
  BackendListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !If [HasCertificate, !Ref HTTPSListener, !Ref HTTPListener]
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/*
              - /api
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ---------------------------------------------------
  # 5. CloudWatch Alarms
  # ---------------------------------------------------
  ALBHighResponseTimeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-alb-high-response-time"
      AlarmDescription: ALB target response time exceeded 2 seconds
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt FinpayALB.LoadBalancerFullName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ALB5xxErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-alb-5xx-errors"
      AlarmDescription: ALB 5XX error count exceeded 10 in 5 minutes
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt FinpayALB.LoadBalancerFullName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  ALBArn:
    Description: ALB ARN
    Value: !Ref FinpayALB
    Export:
      Name: !Sub "${AWS::StackName}-ALBArn"

  ALBDNSName:
    Description: ALB DNS name
    Value: !GetAtt FinpayALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALBDNSName"

  ALBFullName:
    Description: ALB full name (used for CloudWatch metrics)
    Value: !GetAtt FinpayALB.LoadBalancerFullName
    Export:
      Name: !Sub "${AWS::StackName}-ALBFullName"

  ALBHostedZoneId:
    Description: ALB hosted zone ID (used for Route 53 alias records)
    Value: !GetAtt FinpayALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AWS::StackName}-ALBHostedZoneId"

  ALBSecurityGroupId:
    Description: ALB security group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ALBSecurityGroupId"

  HTTPListenerArn:
    Description: HTTP listener ARN
    Value: !Ref HTTPListener
    Export:
      Name: !Sub "${AWS::StackName}-HTTPListenerArn"

  HTTPSListenerArn:
    Condition: HasCertificate
    Description: HTTPS listener ARN
    Value: !Ref HTTPSListener
    Export:
      Name: !Sub "${AWS::StackName}-HTTPSListenerArn"

  FrontendTargetGroupArn:
    Description: Frontend target group ARN
    Value: !Ref FrontendTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-FrontendTargetGroupArn"

  BackendTargetGroupArn:
    Description: Backend target group ARN
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-BackendTargetGroupArn"

  FrontendTargetGroupFullName:
    Description: Frontend target group full name (used for CloudWatch metrics)
    Value: !GetAtt FrontendTargetGroup.TargetGroupFullName
    Export:
      Name: !Sub "${AWS::StackName}-FrontendTargetGroupFullName"

  BackendTargetGroupFullName:
    Description: Backend target group full name (used for CloudWatch metrics)
    Value: !GetAtt BackendTargetGroup.TargetGroupFullName
    Export:
      Name: !Sub "${AWS::StackName}-BackendTargetGroupFullName"