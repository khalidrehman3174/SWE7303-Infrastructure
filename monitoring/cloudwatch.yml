AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Finpay Technologies - CloudWatch Monitoring Stack
  Provisions a centralised CloudWatch dashboard, SNS alarm topic,
  and composite alarms aggregating metrics across the entire Finpay
  platform: ECS, RDS, ElastiCache, ALB, and CodePipeline.

# -------------------------------------------------------
# Parameters
# -------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment name

  ALBStackName:
    Type: String
    Default: finpay-alb
    Description: ALB stack name

  ECSStackName:
    Type: String
    Default: finpay-ecs-cluster
    Description: ECS cluster stack name

  RDSStackName:
    Type: String
    Default: finpay-rds
    Description: RDS stack name

  CloudFrontStackName:
    Type: String
    Default: finpay-cloudfront-waf
    Description: CloudFront/WAF stack name

  AlertEmail:
    Type: String
    Default: "alerts@finpay.com"
    Description: Email address to receive CloudWatch alarm notifications

# -------------------------------------------------------
# Resources
# -------------------------------------------------------
Resources:

  # ---------------------------------------------------
  # 1. SNS Topic for Alarm Notifications
  # ---------------------------------------------------
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "finpay-${EnvironmentName}-alarms"
      DisplayName: !Sub "Finpay ${EnvironmentName} Alarms"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail
      Tags:
        - Key: Project
          Value: Finpay
        - Key: Environment
          Value: !Ref EnvironmentName

  # ---------------------------------------------------
  # 2. ECS Alarms
  # ---------------------------------------------------
  FrontendCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-frontend-high-cpu"
      AlarmDescription: Frontend ECS service CPU utilisation exceeded 80%
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-ClusterName"
        - Name: ServiceName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-FrontendServiceName"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  FrontendMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-frontend-high-memory"
      AlarmDescription: Frontend ECS service memory utilisation exceeded 80%
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-ClusterName"
        - Name: ServiceName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-FrontendServiceName"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  BackendCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-backend-high-cpu"
      AlarmDescription: Backend ECS service CPU utilisation exceeded 80%
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-ClusterName"
        - Name: ServiceName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-BackendServiceName"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  BackendMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-backend-high-memory"
      AlarmDescription: Backend ECS service memory utilisation exceeded 80%
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-ClusterName"
        - Name: ServiceName
          Value: !ImportValue
            Fn::Sub: "${ECSStackName}-BackendServiceName"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # ---------------------------------------------------
  # 3. ALB Alarms
  # ---------------------------------------------------
  ALBHighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-alb-high-latency"
      AlarmDescription: ALB target response time exceeded 2 seconds
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBFullName"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-alb-5xx-errors"
      AlarmDescription: ALB 5XX error count exceeded 10 in 5 minutes
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBFullName"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  ALBUnhealthyHostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-alb-unhealthy-hosts"
      AlarmDescription: One or more ALB targets are unhealthy
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBFullName"
        - Name: TargetGroup
          Value: !ImportValue
            Fn::Sub: "${ALBStackName}-BackendTargetGroupFullName"
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # ---------------------------------------------------
  # 4. RDS Alarms
  # ---------------------------------------------------
  RDSHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-high-cpu"
      AlarmDescription: RDS CPU utilisation exceeded 80%
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !ImportValue
            Fn::Sub: "${RDSStackName}-RDSInstanceId"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  RDSLowStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-low-storage"
      AlarmDescription: RDS free storage below 5GB
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !ImportValue
            Fn::Sub: "${RDSStackName}-RDSInstanceId"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5368709120
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  RDSHighConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-rds-high-connections"
      AlarmDescription: RDS connection count exceeded 80
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !ImportValue
            Fn::Sub: "${RDSStackName}-RDSInstanceId"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # ---------------------------------------------------
  # 5. Composite Alarm - Platform Health
  # ---------------------------------------------------
  PlatformHealthAlarm:
    Type: AWS::CloudWatch::CompositeAlarm
    DependsOn:
      - FrontendCPUAlarm
      - BackendCPUAlarm
      - ALB5xxAlarm
      - RDSHighCPUAlarm
      - ALBUnhealthyHostsAlarm
    Properties:
      AlarmName: !Sub "finpay-${EnvironmentName}-platform-health"
      AlarmDescription: >
        Composite alarm - triggers if any critical platform component is in ALARM state.
        Covers ECS CPU, ALB 5xx errors, unhealthy hosts, and RDS CPU.
      AlarmRule: !Sub >
        ALARM("finpay-${EnvironmentName}-backend-high-cpu") OR
        ALARM("finpay-${EnvironmentName}-alb-5xx-errors") OR
        ALARM("finpay-${EnvironmentName}-alb-unhealthy-hosts") OR
        ALARM("finpay-${EnvironmentName}-rds-high-cpu")
      AlarmActions:
        - !Ref AlarmTopic

  # ---------------------------------------------------
  # 6. CloudWatch Dashboard
  # ---------------------------------------------------
  FinpayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "Finpay-${EnvironmentName}-Platform"
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "text",
                "x": 0, "y": 0, "width": 24, "height": 1,
                "properties": {
                  "markdown": "# Finpay Technologies — ${EnvironmentName} Platform Dashboard"
                }
              },
              {
                "type": "alarm",
                "x": 0, "y": 1, "width": 24, "height": 2,
                "properties": {
                  "title": "Platform Health Overview",
                  "alarms": [
                    "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:finpay-${EnvironmentName}-platform-health",
                    "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:finpay-${EnvironmentName}-alb-unhealthy-hosts",
                    "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:finpay-${EnvironmentName}-rds-low-storage"
                  ]
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 3, "width": 12, "height": 6,
                "properties": {
                  "title": "ECS CPU Utilisation",
                  "metrics": [
                    ["AWS/ECS", "CPUUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${FrontendServiceName}", {"label": "Frontend CPU"}],
                    ["AWS/ECS", "CPUUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${BackendServiceName}", {"label": "Backend CPU"}]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0, "max": 100}},
                  "annotations": {"horizontal": [{"value": 80, "label": "Scale threshold", "color": "#ff6961"}]}
                }
              },
              {
                "type": "metric",
                "x": 12, "y": 3, "width": 12, "height": 6,
                "properties": {
                  "title": "ECS Memory Utilisation",
                  "metrics": [
                    ["AWS/ECS", "MemoryUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${FrontendServiceName}", {"label": "Frontend Memory"}],
                    ["AWS/ECS", "MemoryUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${BackendServiceName}", {"label": "Backend Memory"}]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0, "max": 100}}
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 9, "width": 12, "height": 6,
                "properties": {
                  "title": "ALB Request Count & Latency",
                  "metrics": [
                    ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ALBFullName}", {"label": "Requests", "stat": "Sum"}],
                    ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${ALBFullName}", {"label": "Latency (avg)", "stat": "Average", "yAxis": "right"}]
                  ],
                  "period": 300,
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 12, "y": 9, "width": 12, "height": 6,
                "properties": {
                  "title": "ALB HTTP Error Codes",
                  "metrics": [
                    ["AWS/ApplicationELB", "HTTPCode_ELB_4XX_Count", "LoadBalancer", "${ALBFullName}", {"label": "4XX Errors", "stat": "Sum"}],
                    ["AWS/ApplicationELB", "HTTPCode_ELB_5XX_Count", "LoadBalancer", "${ALBFullName}", {"label": "5XX Errors", "stat": "Sum"}]
                  ],
                  "period": 300,
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 15, "width": 12, "height": 6,
                "properties": {
                  "title": "RDS CPU & Connections",
                  "metrics": [
                    ["AWS/RDS", "CPUUtilization", "DBInstanceIdentifier", "${RDSInstanceId}", {"label": "RDS CPU"}],
                    ["AWS/RDS", "DatabaseConnections", "DBInstanceIdentifier", "${RDSInstanceId}", {"label": "Connections", "yAxis": "right"}]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "view": "timeSeries"
                }
              },
              {
                "type": "metric",
                "x": 12, "y": 15, "width": 12, "height": 6,
                "properties": {
                  "title": "RDS Storage & Latency",
                  "metrics": [
                    ["AWS/RDS", "FreeStorageSpace", "DBInstanceIdentifier", "${RDSInstanceId}", {"label": "Free Storage (bytes)"}],
                    ["AWS/RDS", "ReadLatency", "DBInstanceIdentifier", "${RDSInstanceId}", {"label": "Read Latency", "yAxis": "right"}],
                    ["AWS/RDS", "WriteLatency", "DBInstanceIdentifier", "${RDSInstanceId}", {"label": "Write Latency", "yAxis": "right"}]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "view": "timeSeries"
                }
              }
            ]
          }
        - ClusterName: !ImportValue
            Fn::Sub: "${ECSStackName}-ClusterName"
          FrontendServiceName: !ImportValue
            Fn::Sub: "${ECSStackName}-FrontendServiceName"
          BackendServiceName: !ImportValue
            Fn::Sub: "${ECSStackName}-BackendServiceName"
          ALBFullName: !ImportValue
            Fn::Sub: "${ALBStackName}-ALBFullName"
          RDSInstanceId: !ImportValue
            Fn::Sub: "${RDSStackName}-RDSInstanceId"

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  AlarmTopicArn:
    Description: SNS alarm notification topic ARN
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub "${AWS::StackName}-AlarmTopicArn"

  DashboardName:
    Description: CloudWatch dashboard name
    Value: !Ref FinpayDashboard
    Export:
      Name: !Sub "${AWS::StackName}-DashboardName"

  PlatformHealthAlarmArn:
    Description: Composite platform health alarm ARN
    Value: !Sub "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:finpay-${EnvironmentName}-platform-health"
    Export:
      Name: !Sub "${AWS::StackName}-PlatformHealthAlarmArn"